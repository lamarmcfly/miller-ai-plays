name: Validate Plays

on:
  pull_request:
    paths:
      - "content/plays/**"
      - "apps/web/src/lib/schema.ts"
      - "scripts/validate-plays.ts"
  push:
    branches: [main]
    paths:
      - "content/plays/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate
